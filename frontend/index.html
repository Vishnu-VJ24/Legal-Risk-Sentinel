<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="LexAI analyzes legal contracts with clause extraction, risk scoring, and AI explanations."
    />
    <title>LexAI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <script>
      (function () {
        const redirect = window.location.search.match(/[?&]p=([^&]+)/);
        if (!redirect) return;

        const target = decodeURIComponent(redirect[1]).replace(/~and~/g, '&');
        const nextUrl = window.location.origin + window.location.pathname.replace(/\/$/, '') + target + window.location.hash;
        window.history.replaceState(null, '', nextUrl);
      })();
    </script>
  </head>
  <body class="bg-background">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
